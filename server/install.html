<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
    }

    .app-icon {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      overflow: hidden;
      margin: 0 auto 20px;
    }
    .app-icon svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 14px;
      color: #86868b;
      margin-bottom: 28px;
    }

    .install-btn {
      display: block;
      background: #007aff;
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      padding: 14px 24px;
      border-radius: 12px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.15s;
      width: 100%;
    }
    .install-btn:hover {
      background: #0066d6;
    }
    .install-btn:active {
      background: #0055b3;
    }

    .note {
      font-size: 12px;
      color: #aeaeb2;
      margin-top: 16px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="app-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
        <rect width="120" height="120" rx="26" fill="#1c1b1f"/>
        <rect x="10" y="10" width="100" height="30" rx="8" fill="#2d2c31"/>
        <text x="102" y="32" font-family="system-ui, sans-serif" font-size="18" fill="#e6e0e9" text-anchor="end">0</text>
        <rect x="10" y="46" width="22" height="14" rx="7" fill="#332d41"/>
        <rect x="35" y="46" width="22" height="14" rx="7" fill="#332d41"/>
        <rect x="60" y="46" width="22" height="14" rx="7" fill="#332d41"/>
        <rect x="85" y="46" width="25" height="14" rx="7" fill="#332d41"/>
        <rect x="10" y="64" width="22" height="14" rx="7" fill="#2d2c31"/>
        <rect x="35" y="64" width="22" height="14" rx="7" fill="#2d2c31"/>
        <rect x="60" y="64" width="22" height="14" rx="7" fill="#2d2c31"/>
        <rect x="85" y="64" width="25" height="14" rx="7" fill="#332d41"/>
        <rect x="10" y="82" width="22" height="14" rx="7" fill="#2d2c31"/>
        <rect x="35" y="82" width="22" height="14" rx="7" fill="#2d2c31"/>
        <rect x="60" y="82" width="22" height="14" rx="7" fill="#2d2c31"/>
        <rect x="85" y="82" width="25" height="14" rx="7" fill="#332d41"/>
        <rect x="10" y="100" width="47" height="14" rx="7" fill="#2d2c31"/>
        <rect x="60" y="100" width="22" height="14" rx="7" fill="#2d2c31"/>
        <rect x="85" y="100" width="25" height="14" rx="7" fill="#d0bcff"/>
      </svg>
    </div>

    <h1>Calculator</h1>
    <p class="subtitle">Simple calculator for everyday use</p>

    <a href="/pwa/index.html?mode=calc" class="install-btn">Install App</a>

    <p class="note">
      Works on all devices. No app store required.<br>
      Opens in your browser.
    </p>
  </div>

</body>
</html>
