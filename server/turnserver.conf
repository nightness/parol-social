# ParolNet TURN/STUN Server Configuration
# Environment variables are substituted by entrypoint.sh at startup
listening-port=3478
tls-listening-port=5349
realm=${TURN_REALM}
use-auth-secret
static-auth-secret=${TURN_SECRET}
min-port=49152
max-port=49252
external-ip=${TURN_EXTERNAL_IP}
no-cli
no-stdout-log
log-file=/dev/stdout
fingerprint
lt-cred-mech
no-multicast-peers
no-loopback-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
total-quota=100
bps-capacity=0
stale-nonce=600
max-bps=1000000
cert=/etc/turn-certs/fullchain.pem
pkey=/etc/turn-certs/privkey.pem
