# Safari < 16.4 does not support 'wasm-unsafe-eval' and requires full 'unsafe-eval' for WASM.
# Detection: Safari sets Version/X.Y in UA; Chrome/Firefox do not.
map $http_user_agent $content_security_policy {
    default                 "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' wss: ws:; img-src 'self' data: blob:; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'";
    "~Version/1[0-5]\."    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' wss: ws:; img-src 'self' data: blob:; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'";
    "~Version/16\.0"        "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' wss: ws:; img-src 'self' data: blob:; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'";
}

server {
    listen 80;
    server_name _;

    include /etc/nginx/mime.types;
    types {
        application/wasm wasm;
    }

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy $content_security_policy always;

    # No caching — Cloudflare handles edge caching, we want fresh on every deploy
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    expires 0;

    # Service Worker — must always be fresh
    # NOTE: add_header in a location block drops all parent add_header directives.
    # All security headers must be re-declared here explicitly.
    location /pwa/sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/pwa/" always;
        add_header Content-Security-Policy $content_security_policy always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer" always;
    }

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json application/wasm image/svg+xml;
    gzip_min_length 256;

    # WebSocket proxy to relay server
    location /ws {
        proxy_pass http://127.0.0.1:9000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Health check for relay
    location /health {
        proxy_pass http://127.0.0.1:9000/health;
    }

    # Analytics stats endpoint
    location /stats {
        proxy_pass http://127.0.0.1:9000/stats;
    }

    # Telemetry endpoint
    location /telemetry {
        proxy_pass http://127.0.0.1:9000/telemetry;
        proxy_set_header Content-Type $content_type;
    }

    # Peer discovery endpoints
    location /peers {
        proxy_pass http://127.0.0.1:9000/peers;
    }

    location /bootstrap {
        proxy_pass http://127.0.0.1:9000/bootstrap;
    }

    # Relay directory & federation
    location /directory {
        proxy_pass http://127.0.0.1:9000/directory;
        proxy_set_header Content-Type $content_type;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Authority endorsement
    location /endorse {
        proxy_pass http://127.0.0.1:9000/endorse;
        proxy_set_header Content-Type $content_type;
    }

    # Signed directory push (POST)
    location /directory/push {
        proxy_pass http://127.0.0.1:9000/directory/push;
        proxy_set_header Content-Type $content_type;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Privacy Pass token minting (POST)
    location /tokens/issue {
        proxy_pass http://127.0.0.1:9000/tokens/issue;
        proxy_set_header Content-Type $content_type;
    }

    # H12 Phase 2 presence + lookup (GET)
    location /peers/presence {
        proxy_pass http://127.0.0.1:9000/peers/presence;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /peers/lookup {
        proxy_pass http://127.0.0.1:9000/peers/lookup;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # H12 Phase 3 federation link (WebSocket upgrade, PNP-008-MUST-077).
    # Peer identity is established by the PNP-002 handshake inside the WSS
    # stream (MUST-018) — no HTTP-layer identity header is forwarded.
    location /federation/v1 {
        proxy_pass http://127.0.0.1:9000/federation/v1;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # TURN credentials for WebRTC privacy
    location /turn-credentials {
        proxy_pass http://127.0.0.1:9000/turn-credentials;
    }

    # Bridge relay info
    location /bridge-info {
        proxy_pass http://127.0.0.1:9000/bridge-info;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
