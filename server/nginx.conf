server {
    listen 80;
    server_name _;

    include /etc/nginx/mime.types;
    types {
        application/wasm wasm;
    }

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;

    # No caching — Cloudflare handles edge caching, we want fresh on every deploy
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    expires 0;

    # Service Worker — must always be fresh
    location /pwa/sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/pwa/";
    }

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json application/wasm image/svg+xml;
    gzip_min_length 256;

    # WebSocket proxy to relay server
    location /ws {
        proxy_pass http://127.0.0.1:9000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Health check for relay
    location /health {
        proxy_pass http://127.0.0.1:9000/health;
    }

    # Analytics stats endpoint
    location /stats {
        proxy_pass http://127.0.0.1:9000/stats;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
