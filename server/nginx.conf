server {
    listen 80;
    server_name _;

    include /etc/nginx/mime.types;
    types {
        application/wasm wasm;
    }

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;

    # Service Worker
    location /pwa/sw.js {
        add_header Cache-Control "no-cache";
        add_header Service-Worker-Allowed "/pwa/";
    }

    # PWA manifests — no cache
    location ~* manifest.*\.json$ {
        add_header Cache-Control "no-cache";
    }

    # Cache WASM and icons aggressively
    location /pwa/pkg/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /pwa/icons/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json application/wasm image/svg+xml;
    gzip_min_length 256;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
